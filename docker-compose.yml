services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"   # REST/HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: elion
      POSTGRES_PASSWORD: elion
      POSTGRES_DB: elion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elion -d elion"]
      interval: 10s
      timeout: 5s
      retries: 5

  elion-dal:
    build: .
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
      QDRANT_URL: http://qdrant:6333
      PG_DSN: postgresql+psycopg://elion:elion@postgres:5432/elion
      # На проде образ без torch -> бэкенд fastembed (e5-large, ONNX). flag/BGE-M3
      # потребует тяжёлого образа с .[flag].
      EMBEDDING_BACKEND: fastembed
      AUTO_MIGRATE: "true"
      # Side-port для /healthz (HTTP-проба платформы). Админка теперь — отдельный
      # локальный процесс (см. elion_dal.admin.web), на проде НЕ запускается.
      ADMIN_HOST: 0.0.0.0
      ADMIN_PORT: "8080"
      # API-токен для gRPC; пусто => проверка выключена. Поднимается платформой.
      API_TOKEN: ${API_TOKEN:-}
    ports:
      - "50051:50051"   # gRPC
      - "8080:8080"     # HTTP /healthz
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 600s   # первый старт качает модель ~2 ГБ

volumes:
  qdrant_storage:
  pgdata:
